################################################################################
# GB10 host-memory guardian configuration                                       #
#                                                                              #
# Run only on a Linux cgroup-v2 host. This config and the registration file are #
# published by the service user and must be 0600 single-link regular files.    #
################################################################################

schema_version = 1

[target]
# Stable operator-facing identifier for the protected workload.
label = "aeon-text"
# Single filename, resolved below the --runtime-dir argument.
registration_file = "text-cgroup.v1"

[thresholds]
# Latch Tier 1 below this MemAvailable threshold.
mem_avail_stop_gib = 1
# Pre-touched reserve released before writing the already-open cgroup.kill fd.
reserve_mib = 64

[runtime]
# Linux cgroup-v2 hierarchy root.
cgroup_root = "/sys/fs/cgroup"
# Healthy-loop interval; config reload and target rearming only occur here.
poll_interval_secs = 1
# Latched verification interval after Tier 1.
retry_interval_secs = 5

[escalation]
# Tier 2 is explicitly opt-in. Tier 1 remains the default and only action.
enabled = false
# unit = "vllm-aeon-27b-dflash.service" # Required only when enabled = true.
# grace_period_secs = 60                 # Wait after Tier 1 before Tier 2.

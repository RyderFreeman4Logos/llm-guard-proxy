#| enabled = false
# END PARSEABLE EXAMPLE: upstream-profile

## ───────────────────────── Shielding ────────────────────────────────────────
## Shielded retry: when an upstream response looks broken (empty, repeated
## tokens, truncated), the proxy transparently retries.

[shielding]
enabled = true

## ───────────────────────── Observability ───────────────────────────────────
## Request/response logging, metrics, and health probes.

[observability]
enabled = true
sqlite_path = "/home/obj/.local/state/llm-guard-proxy/observability.sqlite3"
capture_raw_payloads = true                # Log full request/response bodies
metrics_enabled = true                     # Expose /metrics endpoint
health_upstream_probe_enabled = true       # Check upstream in /health
health_upstream_probe_timeout_ms = 2000    # Health probe timeout
debug_summary_enabled = true               # Detailed per-request summaries
debug_summary_max_records = 20             # Max debug summary records
# debug_summary_admin_token = ""           # Token required for debug access

# BEGIN UNCOMMENT-READY EXAMPLE: observability-chat-probe
#| health_chat_probe_enabled = true         # Also probe /v1/chat/completions
#| health_chat_probe_timeout_ms = 15000     # Chat probe timeout, capped at 30s
# END UNCOMMENT-READY EXAMPLE: observability-chat-probe

[observability.retention]
max_bytes = 1073741824                     # 1 GiB max storage
prune_to_bytes = 805306368                 # Prune to 768 MiB
max_records = 100000                       # Max records
prune_to_records = 80000                   # Prune to 80k records

## ───────────────────────── Evidence store ──────────────────────────────────
## Persistent evidence/audit trail for requests and responses.

[evidence]
enabled = true
include_raw_payloads = true
include_request_headers = true
sqlite_path = "/home/obj/.local/state/llm-guard-proxy-evidence/evidence.sqlite3"
blob_cache_dir = "/home/obj/.cache/llm-guard-proxy-evidence/blobs"
max_bytes = 10737418240
prune_to_bytes = 8589934592
max_records = 200000
prune_to_records = 160000

# ── Evidence shadow mode ─────────────────────────────────────────────────────
# Shadow retries: run a retry in parallel without affecting the client
# response, for evidence collection.

[evidence.shadow]
enabled = true
keep_looping_attempt_running = true
parallel_downgrade_attempts = true
max_shadow_attempts_per_request = 4
max_global_shadow_in_flight = 2
shadow_attempt_timeout_ms = 7200000
compare_attempts = ["bounded-thinking", "no-thinking", "cot-salvage"]

# ── Paired shadow comparison (#100) ─────────────────────────────────────────
# Runs paired same-prompt attempts under selected thinking policies
# (e.g., max-thinking vs no-thinking) and records enough raw artifacts for
# offline quality comparison.
#
# This private-host production profile explicitly enables every raw channel.
# Raw reasoning remains separately gated from raw output and is retention-bound.
# Shadow attempts do NOT alter the client-visible response.

[evidence.shadow.paired_comparison]
enabled = true
variants = ["max-thinking", "bounded-thinking", "no-thinking"]
include_raw_input = true
include_raw_output = true
include_raw_reasoning = true
sample_rate = 1.0
max_raw_input_bytes = 131072
max_raw_output_bytes = 131072
max_raw_reasoning_bytes = 131072
max_retention_records = 100000
max_retention_bytes = 8589934592
retention_days = 14

## ───────────────────────── Thinking (reasoning budget) ─────────────────────
## Controls extended-thinking / reasoning token budgets for models that
## support them (e.g., Qwen3, DeepSeek-R1).

[thinking]
mode = "bounded_thinking"
enabled = true
force_disable = false
max_tokens = 50000
budget_tokens = 32768                      # Max thinking tokens per request
# thinking_token_budget = 32768           # Alias for budget_tokens
# budget_accounting = "preserve_answer_budget" # Preserve caller answer headroom

# AEON/Qwen vLLM enforces the numeric budget through the top-level
# thinking_token_budget field; enable_thinking remains a template control.
default_injection_schema = "vllm_native"
preserve_answer_budget = true              # Don't let thinking eat answer budget
tool_request_policy = "apply"              # How thinking applies to tool calls

# ForceThinking defaults to overriding caller no-thinking markers. Set to
# "respect_no_thinking_markers" only when caller latency/compatibility control
# is more important than enforcing the proxy's quality budget. The
# "escape_hatch_only" mode honors llm_guard_proxy_disable_thinking=true only.
no_thinking_marker_policy = "respect_no_thinking_markers"

## ───────────────────────── Loop guard ──────────────────────────────────────
## Detects and mitigates infinite loops in model outputs (repeated tokens,
## suffix cycles, low-progress responses).

[loop_guard]
enabled = true
mode = "enforce"
on_reasoning_loop = "bounded_answer_from_cot"
normalized_input_window_secs = 120         # Dedup window for identical inputs
max_repeated_inputs = 1                    # Max identical inputs before blocking
output_repeated_line_threshold = 24        # Lines before loop detection triggers
output_token_window_size = 12              # Token window for pattern detection
output_repeated_token_window_threshold = 32
output_suffix_cycle_threshold = 32         # Suffix cycle detection threshold
output_low_progress_min_bytes = 4096       # Min bytes for low-progress check
output_low_progress_unique_ratio_percent = 15

# Semantic loop detection: compares reasoning content embeddings to detect
# semantically repetitive thinking (even if exact text differs).
reasoning_semantic_detection_enabled = true
reasoning_semantic_similarity_threshold_percent = 55
reasoning_semantic_window_token_count = 24
reasoning_semantic_minimum_token_count = 8
reasoning_semantic_history_window_count = 16

input_overlap_threshold_multiplier = 4     # Input/output overlap sensitivity

# ── Quality-first loop failure policy (#98) ───────────────────────────────────
# When a reasoning-loop is detected, choose how to recover instead of always
# falling back to the retry ladder (which forces no-thinking too aggressively).
#
# "retry_ladder"              — Preserve existing behavior: abort and continue
#                               through the retry ladder (default).
# "truncate_cot_then_answer"  — Keep a bounded pre-loop private prefix of the
#                               reasoning, then ask for a final answer without
#                               continuing the loop. Preserves answer quality.
# "bounded_answer_from_cot"   — Use private CoT internally for answer synthesis
#                               without exposing raw CoT downstream.

# ── Embedding endpoint for semantic loop detection ───────────────────────────
# The semantic detector above uses normalized token/ngram Jaccard windows by
# default. For higher-recall semantic paraphrase loop detection, point this at
# a separate embedding service (e.g., Qwen3-Embedding on GB10).
#
# If the embedding service is unavailable, the proxy falls back to the
# deterministic detector and records embedding_status=unavailable.

[loop_guard.embedding]
provider = "openai_compatible"
endpoint = "http://100.105.4.92:18012/v1/embeddings"
model = "Qwen/Qwen3-Embedding-8B"
window_token_count = 96
window_stride_tokens = 48
minimum_token_count = 16
history_window_count = 64
batch_max_windows = 64
batch_max_wait_ms = 75
queue_max_windows = 4096
on_queue_full = "block"
vector_dim = 256

## ───────────────────────── Retry ───────────────────────────────────────────
## Retry policy for failed upstream requests.

[retry]
enabled = true
max_attempts = 4                           # Max retry attempts per request
request_deadline_ms = 1200000             # Total shielded retry wall-clock budget per request
anti_loop_hint_enabled = true              # Inject anti-loop hints on retry

# ── Shielded streaming retry ─────────────────────────────────────────────────
# Retry streaming requests that fail mid-stream. The request_deadline_ms budget
# is shared by all ladder attempts, including the final direct no-thinking relay.

shielded_streaming_enabled = true
downstream_drop_policy = "cancel"

# ── Retry ladder ──────────────────────────────────────────────────────────────
# Escalating shielded retry quality ladder. Thinking rungs inherit the selected
# upstream profile's injection schema, including vllm_native. Keep the
# no-thinking rung small so a loop escape hatch cannot consume the caller's
# whole downstream timeout.

[[retry.ladder]]
name = "max-thinking"
thinking_mode = "force_thinking"
max_tokens = 50000
thinking_token_budget = 32768
preserve_answer_budget = true
tool_request_policy = "apply"
no_thinking_marker_policy = "respect_no_thinking_markers"
default_injection_schema = "vllm_native"

[[retry.ladder]]
name = "bounded-thinking-deep"
thinking_mode = "force_thinking"
max_tokens = 50000
thinking_token_budget = 16384
preserve_answer_budget = true
tool_request_policy = "apply"
no_thinking_marker_policy = "respect_no_thinking_markers"
default_injection_schema = "vllm_native"
anti_loop_hint = "Previous attempt became repetitive. Do not repeat prior analysis; answer directly."

[[retry.ladder]]
name = "bounded-thinking"
thinking_mode = "force_thinking"
max_tokens = 50000
thinking_token_budget = 8192
preserve_answer_budget = true
tool_request_policy = "apply"
no_thinking_marker_policy = "respect_no_thinking_markers"
default_injection_schema = "vllm_native"
anti_loop_hint = "Previous attempt became repetitive after a deeper retry. Use only the useful prior work and answer directly."

[[retry.ladder]]
name = "no-thinking"
thinking_mode = "force_disable"
max_tokens = 1024
preserve_answer_budget = true
tool_request_policy = "apply"
no_thinking_marker_policy = "force"
default_injection_schema = "vllm_native"

## ───────────────────────── Heartbeat ───────────────────────────────────────
## SSE heartbeat to keep client connections alive during long generations.

[heartbeat]
mode = "sse"                               # SSE keepalive comments
interval_secs = 15                         # Send heartbeat every 15s

## ───────────────────────── Cloudflare ──────────────────────────────────────
## Cloudflare integration for external access.

[cloudflare]
enabled = true

## ───────────────────────── Host memory guardian ────────────────────────────
## `memory-guardian` is a default-on compile-time feature. The guardian has a
## separate strict configuration file so proxy config reload cannot weaken its
## registration-file ownership checks. Use deploy/gb10/memory-guardian.toml as
## the operator template.
##
## Start it alongside the proxy:
##   llm-guard-proxy --config /etc/llm-guard-proxy/config.toml \
##     --guardian-config /etc/llm-guard-proxy/memory-guardian.toml \
##     --guardian-runtime-dir /run/user/1000/gb10-memory-guardian
##
## Or run the guardian independently:
##   llm-guard-proxy guardian --config /etc/llm-guard-proxy/memory-guardian.toml \
##     --runtime-dir /run/user/1000/gb10-memory-guardian
##
## Fully commented guardian example. Both the guardian config and registration
## file must be 0600 single-link regular files owned by the service user; the cgroup target is
## validated and opened while healthy. The emergency path releases reserve
## memory and writes `1` to that pre-opened cgroup.kill descriptor without
## allocation. Tier 2 is disabled by default.
# schema_version = 1
#
# [target]
# label = "aeon-text"                        # Operator-facing target label
# registration_file = "text-cgroup.v1"       # Filename below runtime-dir
#
# [thresholds]
# mem_avail_stop_gib = 1                      # Tier 1 MemAvailable stop point
# reserve_mib = 64                            # Pre-touched reserve to release
#
# [runtime]
# cgroup_root = "/sys/fs/cgroup"             # cgroup-v2 root
# poll_interval_secs = 1                      # Healthy-loop and hot-reload interval
# retry_interval_secs = 5                     # Latched cgroup.events poll interval
#
# [escalation]
# enabled = false                             # Tier 2 systemd escalation, opt-in
# unit = "vllm-aeon-27b-dflash.service"      # Required only when enabled
# grace_period_secs = 60                      # Delay after Tier 1 before Tier 2

## ───────────────────────── OPT-IN: Guard features ──────────────────────────
## The following sections require building with `--features guard`.
## They provide GWP (Guard Workflow Protocol) hooks, caller profiles,
## model aliases, and stdio workflow execution.
##
## When the guard feature is disabled, these config sections are silently
## ignored during parsing.

# ── Caller profiles ──────────────────────────────────────────────────────────
# Define named profiles with model allowlists and daily request limits.

# BEGIN PARSEABLE EXAMPLE: guard-features
#| [profiles.adult_safe]
#| kind = "adult"
#| allowed_models = ["gpt-4", "child-safe"]
#| daily_request_limit = 0                   # 0 = unlimited
#| shielded_buffering = "off"

# ── Model aliases ────────────────────────────────────────────────────────────
# Map client-requested model names to actual upstream models or workflows.

#| [[model_aliases]]
#| id = "gpt-4"
#| kind = "upstream"
#| upstream_profile = "default"

#| [[model_aliases]]
#| id = "child-safe"
#| kind = "workflow"
#| workflow_id = "child_safe_general.v1"
#| workflow_timeout_ms = 120000             # 2 min timeout (max: 600000)

# ── Workflow definitions ────────────────────────────────────────────────────
# Stdio workflows: external scripts invoked by the proxy for guard checks
# or multi-step model orchestration.

#| [workflows."child_safe_general.v1"]
#| runtime_kind = "stdio"
#| command = "/home/obj/.local/lib/llm-guard-proxy/workflows/child_safe_general.py"
#| args = []
#| timeout_ms = 120000                      # Kill workflow after 2 min
#| max_stdout_bytes = 1048576

# ── Guard workflows ──────────────────────────────────────────────────────────
# Pre-request and post-response guard hooks using GWP protocol.

#| [guard_workflows]
#| pre_request = "child_safe_general.v1"     # Run before forwarding to upstream
#| post_response = "child_safe_general.v1"   # Check the completed response
#| fail_closed_blocks = true                 # Block request if guard errors
#| max_in_flight_executions = 4              # Hard global workflow spawn limit (1-128)
# END PARSEABLE EXAMPLE: guard-features

# ════════════════════════════════════════════════════════════════════════════
# FUTURE: Model-judge loop guard (not yet implemented)
# ════════════════════════════════════════════════════════════════════════════
# The design bundle (2026-07-07) proposes an optional no-thinking model judge
# that runs on top of the existing loop guard. It would use the same local
# model with thinking disabled to classify ambiguous loops and generate a
# bounded clean_reasoning_state for retry.
#
# This feature is NOT yet implemented. The config below is the proposed shape
# from the design docs, included here for reference and feedback.
# When implemented, it MUST be disabled by default and hot-reloadable.

# [judge]
# enabled = false                          # Disabled by default
# mode = "disabled"                        # disabled, monitor, enforce
# profile = "latency_first"               # latency_first, quality_first
# force_disable_thinking = true            # Judge always runs no-thinking
# temperature = 0.0                        # Deterministic judge output
# top_p = 1.0
# max_tokens_detect = 256                  # Max tokens for loop classification
# max_tokens_salvage = 768                 # Max tokens for clean-state salvage
# max_prompt_tokens_detect = 4096          # Max prompt tokens for judge input
# max_prompt_tokens_salvage = 8192         # Max prompt tokens for salvage input
# max_in_flight = 0                        # Concurrent judge jobs (0 = disabled)
# queue_max = 0                            # Max queued judge jobs
# cancel_stale_jobs = true                 # Cancel superseded judge jobs
# cache_by_snapshot_hash = true            # Skip duplicate snapshot evaluations
# global_request_wall_clock_budget_ms = 1800000  # 30 min hard ceiling
# per_detect_timeout_ms = 30000            # Per-judge-call timeout
# per_salvage_timeout_ms = 90000           # Per-salvage-call timeout
# max_judge_rounds_per_attempt = 0         # Max judge invocations per attempt
# max_judge_rounds_per_request = 0         # Max judge invocations per request

# ── Judge model endpoint ─────────────────────────────────────────────────────
# The judge can use the same upstream as the primary model, or a separate
# endpoint if spare compute is available.

# upstream_base_url = ""                   # Empty = same as primary upstream
# model = ""                               # Empty = same as primary model

# ── Judge trigger thresholds ─────────────────────────────────────────────────

# [judge.trigger]
# min_generated_tokens = 1024              # Don't judge before this many tokens
# risk_threshold_watch = 0.35              # Start monitoring at this risk
# risk_threshold_judge = 0.50              # Invoke judge at this risk
# risk_threshold_abort_without_judge = 0.90  # Abort without waiting for judge
# judge_every_tokens = 1024                # Re-judge interval (normal risk)
# accelerated_judge_every_tokens = 512     # Re-judge interval (high risk)

# ── Judge policy (enforce mode) ──────────────────────────────────────────────

# [judge.policy]
# abort_if_confidence_ge = 0.78            # Abort reasoning-only loop threshold
# abort_visible_or_tool_if_confidence_ge = 0.65  # Lower threshold for visible/tool
# salvage_before_retry = true              # Generate clean-state before retry
# default_retry = "bounded-thinking"       # First retry strategy
# fallback_retry = "no-thinking"           # Fallback if default also loops

# ── Judge observability ──────────────────────────────────────────────────────

# [judge.observability]
# include_short_reason = true              # Record judge's one-sentence reason
# include_clean_state_hash = true          # Hash of clean-state for dedup
# include_raw_snapshots = false            # Raw loop snapshots (sensitive!)
# include_raw_clean_state = false          # Raw clean-state text (sensitive!)

################################################################################
# llm-guard-proxy reviewed configuration snapshot — GB10 deployment            #
#                                                                              #
# Active values mirror the authoritative gb10-services production config.      #
# The reviewed native-thinking schema is the only intentional semantic delta.  #
#                                                                              #
# Commented sections document optional features and parseable examples.         #
################################################################################

## ───────────────────────── Server ───────────────────────────────────────────
## Network listener and admission-control settings.

[server]
# Bind address. Use 0.0.0.0 for all interfaces, or a Tailscale IP for
# tailnet-only access.
bind_host = "100.105.4.92"

# Port the proxy listens on.
port = 18009

# Maximum concurrent upstream inference requests. Additional requests are
# queued up to max_queued_generation_requests.
max_in_flight_requests = 4

# Maximum concurrent control-plane requests (health, metrics, config snapshot).
max_control_plane_in_flight_requests = 128

# Maximum request body size in bytes (4 MiB). Protects against memory
# exhaustion from large payloads.
max_request_body_bytes = 4194304

# Maximum graceful shutdown drain wait after SIGTERM starts cancellation.
# shutdown_drain_timeout_ms = 30000

# ── Generation queue ──────────────────────────────────────────────────────────
# When max_in_flight_requests is reached, new requests enter a bounded queue.

max_queued_generation_requests = 128
generation_queue_timeout_ms = 1800000       # 30 min
generation_queue_full_status = 429          # HTTP status when queue full
generation_queue_retry_after_secs = 10

## ───────────────────────── Compatibility listeners ─────────────────────────
## Preserve legacy embedding/reranker ports and the aggregate routing port.

[[listeners]]
name = "embedding-legacy"
bind_host = "100.105.4.92"
port = 18002
allowed_upstreams = ["qwen3-embedding-8b"]

[[listeners]]
name = "reranker-legacy"
bind_host = "100.105.4.92"
port = 18003
allowed_upstreams = ["qwen3-reranker-8b"]

[[listeners]]
name = "aggregate"
bind_host = "100.105.4.92"
port = 18005

## ───────────────────────── Upstream (single) ────────────────────────────────
## The default upstream inference endpoint. For multi-upstream routing, use
## the [upstreams.*] topology below instead.

[upstream]
# Base URL of the vLLM / inference server (must include /v1).
base_url = "http://100.105.4.92:18010/v1"

# Total request timeout including streaming (30 min).
request_timeout_ms = 1800000

[upstream.hot_restart]
enabled = true
probe_max_tokens = 1
probe_interval_secs = 5
probe_timeout_secs = 600

# BEGIN UNCOMMENT-READY EXAMPLE: hot-restart-chat-probe
#| probe_messages = [{"role":"user","content":"deployment readiness"}] # Custom readiness prompt
#| probe_chat_template_kwargs = {"enable_thinking":false}                  # Optional template controls for the probe
# END UNCOMMENT-READY EXAMPLE: hot-restart-chat-probe

# ── Upstream stall detection ─────────────────────────────────────────────────
# Detects stalled upstream connections (idle without producing tokens).

[upstream.stall]
enabled = true
first_chunk_timeout_ms = 600000          # Allow long capacity-queue TTFT before first SSE chunk
idle_timeout_ms = 300000                 # Abort after 300s with no tokens after first chunk
recovery_timeout_ms = 300000             # Max wait for recovery command
recovery_cooldown_ms = 300000            # Cooldown between recovery attempts
recovery_budget_window_ms = 900000       # Budget window for recovery attempts
recovery_max_per_window = 2              # Max recovery attempts per window

# BEGIN PARSEABLE EXAMPLE: upstream-stall-recovery
#| [upstream.stall]
#| recovery_command = ["systemctl", "--user", "restart", "vllm-aeon-27b-dflash.service"] # argv, never a shell string
# END PARSEABLE EXAMPLE: upstream-stall-recovery

# ── Local upstream recovery (OPT-IN command execution) ───────────────────────
# Restarts a co-located upstream service after a stall/deadline-class failure,
# waits for a real chat completion readiness probe, then replays the original
# shielded request if the downstream connection is still alive.
#
# Safe default: disabled and no command is executed. restart_command is argv;
# the proxy never runs it through a shell and never connects request content to
# the command's stdin/stdout/stderr.

# BEGIN PARSEABLE EXAMPLE: upstream-local-recovery
#| [upstream.local_recovery]
#| enabled = true                                                     # Enable local restart recovery
#| restart_command = ["systemctl", "--user", "restart", "vllm-aeon-27b-dflash.service"]  # argv restart command
#| restart_timeout_ms = 300000                                        # Max wait for restart command
#| readiness_endpoint = "/v1/chat/completions"                        # Real chat readiness endpoint
#| readiness_body = {"model":"aeon-ultimate","messages":[{"role":"user","content":"1+1=?"}],"chat_template_kwargs":{"enable_thinking":false},"max_tokens":1}  # Probe payload; not recorded
#| readiness_request_timeout_ms = 30000                               # Max wait for one readiness POST
#| readiness_deadline_ms = 600000                                     # Total readiness wait after restart
#| readiness_interval_ms = 5000                                       # Delay between readiness probes
#| max_attempts_per_request = 1                                       # Per downstream request recovery cap
#| cooldown_ms = 300000                                               # Cooldown between completed recoveries
#| budget_window_ms = 900000                                          # Rolling recovery budget window
#| max_per_window = 2                                                 # Max recoveries per budget window
# END PARSEABLE EXAMPLE: upstream-local-recovery

# ── Upstream metadata discovery ──────────────────────────────────────────────
# Automatically discovers model metadata from /v1/models.

[upstream.metadata]
discovery_enabled = true
enrich_responses = true                    # Add model info to response metadata
refresh_interval_secs = 60                 # Re-discover every 60s
# context_length_override = 0             # Override detected context length (0 = auto)
# max_model_len_override = 0              # Override detected max model length
input_token_safety_margin = 512           # Tokens reserved for response

## ───────────────────────── Upstream topology (multi-upstream) ───────────────
## Profiles are ordered routes. The first matching model wins; [upstream]
## remains the fallback. These active values mirror the gb10-services source.

[[upstreams]]
name = "aeon-chat"
base_url = "http://100.105.4.92:18010/v1"
match_models = ["aeon-ultimate", "qwen3.6-27b-decensor-by-aeon"]
request_timeout_ms = 1800000
max_in_flight_requests = 4
max_queued_generation_requests = 64

[upstreams.metadata]
discovery_enabled = true
enrich_responses = true
refresh_interval_secs = 60
input_token_safety_margin = 512

[upstreams.hot_restart]
enabled = true
probe_max_tokens = 1
probe_interval_secs = 5
probe_timeout_secs = 600

[upstreams.thinking]
mode = "bounded_thinking"
enabled = true
force_disable = false
max_tokens = 50000                 # Total output cap; caller limits below it remain unchanged
budget_tokens = 32768
preserve_answer_budget = true
tool_request_policy = "apply"
no_thinking_marker_policy = "respect_no_thinking_markers"
default_injection_schema = "vllm_native"

[upstreams.param_override]
enabled = true
temperature = 0.6
top_p = 0.95
top_k = 20
max_tokens = 50000                 # Supplies the same total cap when thinking policy omits one
frequency_penalty = 0.0
presence_penalty = 0.0

[[upstreams]]
name = "qwen3-embedding-8b"
base_url = "http://100.105.4.92:18012/v1"
match_models = ["qwen3-embedding-8b", "Qwen/Qwen3-Embedding-8B"]
request_timeout_ms = 1800000
max_in_flight_requests = 8
max_queued_generation_requests = 64

[upstreams.metadata]
discovery_enabled = true
enrich_responses = true
refresh_interval_secs = 60
input_token_safety_margin = 512

[upstreams.hot_restart]
enabled = false

[upstreams.thinking]
mode = "passthrough"
enabled = false

[upstreams.param_override]
enabled = false

[[upstreams]]
name = "qwen3-reranker-8b"
base_url = "http://100.105.4.92:18013/v1"
match_models = ["qwen3-reranker-8b", "Qwen/Qwen3-Reranker-8B"]
request_timeout_ms = 1800000
max_in_flight_requests = 8
max_queued_generation_requests = 64

[upstreams.metadata]
discovery_enabled = true
enrich_responses = true
refresh_interval_secs = 60
input_token_safety_margin = 512

[upstreams.hot_restart]
enabled = false

[upstreams.thinking]
mode = "passthrough"
enabled = false

[upstreams.param_override]
enabled = false

# BEGIN PARSEABLE EXAMPLE: upstream-profile
#| [[upstreams]]
#| name = "example-model"

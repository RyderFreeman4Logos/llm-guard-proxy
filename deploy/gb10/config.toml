################################################################################
# llm-guard-proxy example configuration — GB10 deployment                     #
#                                                                              #
# This file documents every feature the proxy supports. Lines marked            #
# "# DEFAULT-ON" are compiled by default; those marked "# OPT-IN (guard)"       #
# require building with `--features guard`.                                    #
#                                                                              #
# Uncomment and adjust the values you need. All commented-out sections          #
# show safe defaults — you only need to uncomment to change them.               #
################################################################################

## ───────────────────────── Server ───────────────────────────────────────────
## Network listener and admission-control settings.

[server]
# Bind address. Use 0.0.0.0 for all interfaces, or a Tailscale IP for
# tailnet-only access.
bind_host = "100.105.4.92"

# Port the proxy listens on.
port = 18009

# Maximum concurrent upstream inference requests. Additional requests are
# queued up to max_queued_generation_requests.
max_in_flight_requests = 16

# Maximum concurrent control-plane requests (health, metrics, config snapshot).
max_control_plane_in_flight_requests = 128

# Maximum request body size in bytes (64 MiB). Protects against memory
# exhaustion from large payloads.
max_request_body_bytes = 67108864

# Maximum graceful shutdown drain wait after SIGTERM starts cancellation.
# shutdown_drain_timeout_ms = 30000

# ── Generation queue ──────────────────────────────────────────────────────────
# When max_in_flight_requests is reached, new requests enter a bounded queue.

# max_queued_generation_requests = 32
# generation_queue_timeout_ms = 300000      # 5 min
# generation_queue_full_status = 429         # HTTP status when queue full
# generation_queue_retry_after_secs = 10

## ───────────────────────── Upstream (single) ────────────────────────────────
## The default upstream inference endpoint. For multi-upstream routing, use
## the [upstreams.*] topology below instead.

[upstream]
# Base URL of the vLLM / inference server (must include /v1).
base_url = "http://100.105.4.92:18010/v1"

# Total request timeout including streaming (10 min).
request_timeout_ms = 600000

# ── Upstream stall detection ─────────────────────────────────────────────────
# Detects stalled upstream connections (idle without producing tokens).

[upstream.stall]
# enabled = true
# idle_timeout_ms = 30000                 # Abort after 30s of no tokens
# recovery_command = ""                   # Shell command to restart upstream
# recovery_timeout_ms = 300000            # Max wait for recovery command
# recovery_cooldown_ms = 10000            # Cooldown between recovery attempts
# recovery_budget_window_ms = 600000      # Budget window for recovery attempts
# recovery_max_per_window = 3             # Max recovery attempts per window

# ── Upstream metadata discovery ──────────────────────────────────────────────
# Automatically discovers model metadata from /v1/models.

[upstream.metadata]
discovery_enabled = true
enrich_responses = true                    # Add model info to response metadata
refresh_interval_secs = 60                 # Re-discover every 60s
# context_length_override = 0             # Override detected context length (0 = auto)
# max_model_len_override = 0              # Override detected max model length
# input_token_safety_margin = 512         # Tokens reserved for response

## ───────────────────────── Upstream topology (multi-upstream) ───────────────
## Define multiple upstream profiles for routing, load balancing, and
## per-profile configuration. When defined, [upstream] becomes the default
## fallback.

# [upstreams.topology]
# profiles = ["adult"]

# ── Profile: adult ────────────────────────────────────────────────────────────
# Each profile can have its own upstream URL, model, and feature overrides.

# [upstream_profiles.adult]
# base_url = "http://100.105.4.92:18010/v1"
# request_timeout_ms = 600000
# max_in_flight_requests = 16
# max_queued_generation_requests = 32

# [upstream_profiles.adult.metadata]
# discovery_enabled = true
# enrich_responses = true
# refresh_interval_secs = 60

# ── Hot-restart protection (DEFAULT-ON feature) ──────────────────────────────
# When the upstream service restarts (~10 min), client requests are preserved
# and retried after the service is truly ready. Readiness is verified via a
# real chat completion probe (POST /v1/chat/completions with max_tokens=1),
# NOT just /v1/models — because /v1/models can return 200 before the model
# is actually loaded and ready to generate tokens.
#
# This feature is compiled by default. Disable per-profile if not needed.

# [upstream_profiles.adult.hot_restart]
# enabled = true                                        # DEFAULT: true
# probe_max_tokens = 1                                  # Minimal tokens for probe
# probe_interval_secs = 5                               # Poll every 5s during restart
# probe_timeout_secs = 600                              # Give up after 10 min (600s)
# probe_messages = [{"role" = "user", "content" = "1+1=?"}]
# probe_chat_template_kwargs = {"enable_thinking" = false}

# ── Parameter override (DEFAULT-ON feature) ──────────────────────────────────
# Force-override inference parameters on incoming requests. Useful for
# clients that send unreasonable parameters (e.g., temperature=2.0) and
# can't/won't change their settings.
#
# When enabled and a parameter is set (non-null):
#   - The proxy REPLACES the client's value with the configured value
#   - If the parameter is missing from the request, it is ADDED
#   - Only explicitly-set parameters are overridden; others pass through

# [upstream_profiles.adult.param_override]
# enabled = true                                        # DEFAULT: true
# temperature = 0.6                                     # Override temperature
# top_p = 0.95                                          # Override top_p
# top_k = 40                                            # Override top_k
# max_tokens = 8192                                     # Override/cap max_tokens
# frequency_penalty = 0.0                               # Override frequency_penalty
# presence_penalty = 0.0                                # Override presence_penalty

## ───────────────────────── Shielding ────────────────────────────────────────
## Shielded retry: when an upstream response looks broken (empty, repeated
## tokens, truncated), the proxy transparently retries.

[shielding]
enabled = true

## ───────────────────────── Observability ───────────────────────────────────
## Request/response logging, metrics, and health probes.

[observability]
enabled = true
sqlite_path = "/home/obj/.local/state/llm-guard-proxy/observability.sqlite3"
capture_raw_payloads = false               # Log full request/response bodies
metrics_enabled = true                     # Expose /metrics endpoint
health_upstream_probe_enabled = true       # Check upstream in /health
health_upstream_probe_timeout_ms = 500     # Health probe timeout
# Optional chat-completion readiness probe. When enabled, /health additionally
# sends a minimal chat completion request and reports `upstream = "degraded"`
# (HTTP 200) if the models probe succeeds but the chat probe fails. Disabled by
# default to avoid unnecessary GPU work during routine health checks.
health_chat_probe_enabled = false          # Also probe /v1/chat/completions
health_chat_probe_timeout_ms = 10000       # Chat probe timeout (capped at 10s)
debug_summary_enabled = false              # Detailed per-request summaries
debug_summary_max_records = 20             # Max debug summary records
# debug_summary_admin_token = ""           # Token required for debug access

[observability.retention]
max_bytes = 1073741824                     # 1 GiB max storage
prune_to_bytes = 805306368                 # Prune to 768 MiB
max_records = 100000                       # Max records
prune_to_records = 80000                   # Prune to 80k records

## ───────────────────────── Evidence store ──────────────────────────────────
## Persistent evidence/audit trail for requests and responses.

[evidence]
# enabled = false
# include_raw_payloads = false            # Store full request/response bodies
# include_request_headers = false         # Store request headers
# sqlite_path = ""                        # SQLite database path
# blob_cache_dir = ""                     # Directory for large blobs

# max_bytes = 536870912                   # 512 MiB
# prune_to_bytes = 402653184              # Prune to 384 MiB
# max_records = 50000
# prune_to_records = 40000

# ── Evidence shadow mode ─────────────────────────────────────────────────────
# Shadow retries: run a retry in parallel without affecting the client
# response, for evidence collection.

# [evidence.shadow]
# enabled = false
# keep_looping_attempt_running = false    # Keep the original (looping) attempt running
# parallel_downgrade_attempts = 1         # Parallel shadow attempts
# max_shadow_attempts_per_request = 1
# max_global_shadow_in_flight = 4
# shadow_attempt_timeout_ms = 300000      # 5 min

# ── Paired shadow comparison (#100) ─────────────────────────────────────────
# Runs paired same-prompt attempts under selected thinking policies
# (e.g., max-thinking vs no-thinking) and records enough raw artifacts for
# offline quality comparison.
#
# ALL raw capture is OFF by default. Enable each kind explicitly.
# Raw reasoning is separately gated even when raw output is enabled.
# Shadow attempts do NOT alter the client-visible response.

# [evidence.shadow.paired_comparison]
# enabled = false                          # Opt-in only
# variants = ["max-thinking", "no-thinking"]  # Thinking variants to compare
# include_raw_input = false                # Store raw input (off by default)
# include_raw_output = false               # Store raw output (off by default)
# include_raw_reasoning = false            # Store raw CoT (separately gated)
# sample_rate = 0.0                        # 0.0 = no sampling, 1.0 = all
# max_raw_input_bytes = 131072             # 128 KiB per raw input artifact
# max_raw_output_bytes = 131072            # 128 KiB per raw output artifact
# max_raw_reasoning_bytes = 131072         # 128 KiB per raw reasoning artifact
# max_retention_records = 10000            # Prune raw content above this count
# max_retention_bytes = 1073741824         # 1 GiB total raw content
# retention_days = 7                       # Expire raw content after N days

## ───────────────────────── Thinking (reasoning budget) ─────────────────────
## Controls extended-thinking / reasoning token budgets for models that
## support them (e.g., Qwen3, DeepSeek-R1).

[thinking]
enabled = true
force_disable = false
budget_tokens = 32768                      # Max thinking tokens per request
# thinking_token_budget = 32768           # Alias for budget_tokens
# budget_accounting = "canonical"         # How budget is communicated to model
# max_tokens = 0                          # Max output tokens (0 = unlimited)

# AEON/Qwen vLLM ignores canonical thinking.budget_tokens on plain OpenAI
# payloads; inject chat_template_kwargs when no caller schema exists.
default_injection_schema = "chat_template_kwargs"
preserve_answer_budget = true              # Don't let thinking eat answer budget
tool_request_policy = "passthrough"        # How thinking applies to tool calls

# ForceThinking defaults to overriding caller no-thinking markers. Set to
# "respect_no_thinking_markers" only when caller latency/compatibility control
# is more important than enforcing the proxy's quality budget. The
# "escape_hatch_only" mode honors llm_guard_proxy_disable_thinking=true only.
no_thinking_marker_policy = "force"

## ───────────────────────── Loop guard ──────────────────────────────────────
## Detects and mitigates infinite loops in model outputs (repeated tokens,
## suffix cycles, low-progress responses).

[loop_guard]
enabled = true
normalized_input_window_secs = 120         # Dedup window for identical inputs
max_repeated_inputs = 1                    # Max identical inputs before blocking
output_repeated_line_threshold = 24        # Lines before loop detection triggers
output_token_window_size = 12              # Token window for pattern detection
output_repeated_token_window_threshold = 32
output_suffix_cycle_threshold = 32         # Suffix cycle detection threshold
output_low_progress_min_bytes = 4096       # Min bytes for low-progress check
output_low_progress_unique_ratio_percent = 15

# Semantic loop detection: compares reasoning content embeddings to detect
# semantically repetitive thinking (even if exact text differs).
reasoning_semantic_detection_enabled = true
reasoning_semantic_similarity_threshold_percent = 55
reasoning_semantic_window_token_count = 24
reasoning_semantic_minimum_token_count = 8
reasoning_semantic_history_window_count = 16

input_overlap_threshold_multiplier = 4     # Input/output overlap sensitivity

# ── Quality-first loop failure policy (#98) ───────────────────────────────────
# When a reasoning-loop is detected, choose how to recover instead of always
# falling back to the retry ladder (which forces no-thinking too aggressively).
#
# "retry_ladder"              — Preserve existing behavior: abort and continue
#                               through the retry ladder (default).
# "truncate_cot_then_answer"  — Keep a bounded pre-loop private prefix of the
#                               reasoning, then ask for a final answer without
#                               continuing the loop. Preserves answer quality.
# "bounded_answer_from_cot"   — Use private CoT internally for answer synthesis
#                               without exposing raw CoT downstream.

# on_reasoning_loop = "retry_ladder"

# ── Embedding endpoint for semantic loop detection ───────────────────────────
# The semantic detector above uses normalized token/ngram Jaccard windows by
# default. For higher-recall semantic paraphrase loop detection, point this at
# a separate embedding service (e.g., Qwen3-Embedding on GB10).
#
# If the embedding service is unavailable, the proxy falls back to the
# deterministic detector and records embedding_status=unavailable.

# [loop_guard.embedding]
# provider = "openai_compatible"            # openai_compatible, tei, disabled
# endpoint = "http://100.105.4.92:18012/v1/embeddings"  # separate embedding svc
# model = "Qwen/Qwen3-Embedding-0.6B"       # embedding model name
# window_token_count = 96                   # Tokens per embedding window
# window_stride_tokens = 48                 # Stride between windows
# minimum_token_count = 16                  # Skip windows shorter than this
# history_window_count = 64                 # How many past windows to compare
# batch_max_windows = 64                    # Max windows per embedding batch
# batch_max_wait_ms = 75                    # Max wait to fill a batch
# vector_dim = 256                          # MRL dimension reduction (0 = full)

## ───────────────────────── Retry ───────────────────────────────────────────
## Retry policy for failed upstream requests.

[retry]
enabled = true
max_attempts = 5                           # Max retry attempts per request
request_deadline_ms = 600000              # Total shielded retry wall-clock budget per request
anti_loop_hint_enabled = true              # Inject anti-loop hints on retry

# ── Shielded streaming retry ─────────────────────────────────────────────────
# Retry streaming requests that fail mid-stream. The request_deadline_ms budget
# is shared by all ladder attempts, including the final direct no-thinking relay.

# shielded_streaming_enabled = true
# downstream_drop_policy = "cancel"  # cancel or detach after downstream drop

# ── Retry ladder ──────────────────────────────────────────────────────────────
# Escalating shielded retry quality ladder. Keep the no-thinking rung small so a
# loop escape hatch cannot consume the caller's whole downstream timeout.

# [[retry.ladder]]
# name = "max-thinking"
# thinking_mode = "force_thinking"
# max_tokens = 50000
# thinking_token_budget = 32768

# [[retry.ladder]]
# name = "bounded-thinking"
# thinking_mode = "force_thinking"
# max_tokens = 50000
# thinking_token_budget = 8192
# anti_loop_hint = "Previous attempt became repetitive. Answer directly."

# [[retry.ladder]]
# name = "no-thinking"
# thinking_mode = "force_disable"
# max_tokens = 1024

## ───────────────────────── Heartbeat ───────────────────────────────────────
## SSE heartbeat to keep client connections alive during long generations.

[heartbeat]
mode = "sse"                               # SSE keepalive comments
interval_secs = 15                         # Send heartbeat every 15s

## ───────────────────────── Cloudflare ──────────────────────────────────────
## Cloudflare integration for external access.

[cloudflare]
enabled = true

## ───────────────────────── OPT-IN: Guard features ──────────────────────────
## The following sections require building with `--features guard`.
## They provide GWP (Guard Workflow Protocol) hooks, caller profiles,
## model aliases, and stdio workflow execution.
##
## When the guard feature is disabled, these config sections are silently
## ignored during parsing.

# ── Caller profiles ──────────────────────────────────────────────────────────
# Define named profiles with model allowlists and daily request limits.

# [profiles.adult_safe]
# kind = "standard"
# allowed_models = ["Qwen3-235B-A22B-Instruct-2507", "Qwen3-30B-A3B-Instruct-2507"]
# daily_request_limit = 0                   # 0 = unlimited

# ── Model aliases ────────────────────────────────────────────────────────────
# Map client-requested model names to actual upstream models or workflows.

# [[model_aliases]]
# pattern = "gpt-4"
# target_kind = "model"
# target_model = "Qwen3-235B-A22B-Instruct-2507"

# [[model_aliases]]
# pattern = "child-safe"
# target_kind = "workflow"
# workflow_id = "child_safe_general.v1"
# workflow_timeout_ms = 120000             # 2 min timeout (max: 600000)

# ── Workflow definitions ────────────────────────────────────────────────────
# Stdio workflows: external scripts invoked by the proxy for guard checks
# or multi-step model orchestration.

# [workflows."child_safe_general.v1"]
# kind = "stdio"
# command = "/opt/llm-guard-proxy/workflows/child_safe_general.sh"
# timeout_ms = 120000                      # Kill workflow after 2 min

# ── Guard workflows ──────────────────────────────────────────────────────────
# Pre-request and post-response guard hooks using GWP protocol.

# [guard_workflows]
# pre_request = "content_filter.v1"         # Run before forwarding to upstream
# post_response = "output_check.v1"         # Run after receiving response
# fail_closed_blocks = true                 # Block request if guard errors

# ════════════════════════════════════════════════════════════════════════════
# FUTURE: Model-judge loop guard (not yet implemented)
# ════════════════════════════════════════════════════════════════════════════
# The design bundle (2026-07-07) proposes an optional no-thinking model judge
# that runs on top of the existing loop guard. It would use the same local
# model with thinking disabled to classify ambiguous loops and generate a
# bounded clean_reasoning_state for retry.
#
# This feature is NOT yet implemented. The config below is the proposed shape
# from the design docs, included here for reference and feedback.
# When implemented, it MUST be disabled by default and hot-reloadable.

# [judge]
# enabled = false                          # Disabled by default
# mode = "disabled"                        # disabled, monitor, enforce
# profile = "latency_first"               # latency_first, quality_first
# force_disable_thinking = true            # Judge always runs no-thinking
# temperature = 0.0                        # Deterministic judge output
# top_p = 1.0
# max_tokens_detect = 256                  # Max tokens for loop classification
# max_tokens_salvage = 768                 # Max tokens for clean-state salvage
# max_prompt_tokens_detect = 4096          # Max prompt tokens for judge input
# max_prompt_tokens_salvage = 8192         # Max prompt tokens for salvage input
# max_in_flight = 0                        # Concurrent judge jobs (0 = disabled)
# queue_max = 0                            # Max queued judge jobs
# cancel_stale_jobs = true                 # Cancel superseded judge jobs
# cache_by_snapshot_hash = true            # Skip duplicate snapshot evaluations
# global_request_wall_clock_budget_ms = 1800000  # 30 min hard ceiling
# per_detect_timeout_ms = 30000            # Per-judge-call timeout
# per_salvage_timeout_ms = 90000           # Per-salvage-call timeout
# max_judge_rounds_per_attempt = 0         # Max judge invocations per attempt
# max_judge_rounds_per_request = 0         # Max judge invocations per request

# ── Judge model endpoint ─────────────────────────────────────────────────────
# The judge can use the same upstream as the primary model, or a separate
# endpoint if spare compute is available.

# upstream_base_url = ""                   # Empty = same as primary upstream
# model = ""                               # Empty = same as primary model

# ── Judge trigger thresholds ─────────────────────────────────────────────────

# [judge.trigger]
# min_generated_tokens = 1024              # Don't judge before this many tokens
# risk_threshold_watch = 0.35              # Start monitoring at this risk
# risk_threshold_judge = 0.50              # Invoke judge at this risk
# risk_threshold_abort_without_judge = 0.90  # Abort without waiting for judge
# judge_every_tokens = 1024                # Re-judge interval (normal risk)
# accelerated_judge_every_tokens = 512     # Re-judge interval (high risk)

# ── Judge policy (enforce mode) ──────────────────────────────────────────────

# [judge.policy]
# abort_if_confidence_ge = 0.78            # Abort reasoning-only loop threshold
# abort_visible_or_tool_if_confidence_ge = 0.65  # Lower threshold for visible/tool
# salvage_before_retry = true              # Generate clean-state before retry
# default_retry = "bounded-thinking"       # First retry strategy
# fallback_retry = "no-thinking"           # Fallback if default also loops

# ── Judge observability ──────────────────────────────────────────────────────

# [judge.observability]
# include_short_reason = true              # Record judge's one-sentence reason
# include_clean_state_hash = true          # Hash of clean-state for dedup
# include_raw_snapshots = false            # Raw loop snapshots (sensitive!)
# include_raw_clean_state = false          # Raw clean-state text (sensitive!)
